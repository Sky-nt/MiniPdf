name: Deploy MiniPdf API to Azure

on:
  push:
    branches: [ main ]
    paths:
      - 'MiniPdf.Api/**'
      - 'src/MiniPdf/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: minipdf-api
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MiniPdf.Api/MiniPdf.Api.csproj

      - name: Build
        run: dotnet build MiniPdf.Api/MiniPdf.Api.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish MiniPdf.Api/MiniPdf.Api.csproj -c Release --no-build -o ${{ github.workspace }}/publish

      - name: Zip publish output
        run: cd ${{ github.workspace }}/publish && zip -r ${{ github.workspace }}/deploy.zip .

      - name: Deploy via Kudu ZipDeploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
        run: |
          KUDU_USER=$(python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'])
          p = next(x for x in root.findall('publishProfile') if x.get('publishMethod') == 'ZipDeploy')
          print(p.get('userName'))
          ")
          KUDU_PWD=$(python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'])
          p = next(x for x in root.findall('publishProfile') if x.get('publishMethod') == 'ZipDeploy')
          print(p.get('userPWD'))
          ")
          curl -X POST \
            "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
            -u "${KUDU_USER}:${KUDU_PWD}" \
            --data-binary @"${{ github.workspace }}/deploy.zip" \
            -H "Content-Type: application/zip" \
            --fail --show-error
