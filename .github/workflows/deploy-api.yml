name: Deploy MiniPdf API to Azure

on:
  push:
    branches: [ main ]
    paths:
      - 'MiniPdf.Api/**'
      - 'src/MiniPdf/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: minipdf-api
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MiniPdf.Api/MiniPdf.Api.csproj

      - name: Build
        run: dotnet build MiniPdf.Api/MiniPdf.Api.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish MiniPdf.Api/MiniPdf.Api.csproj -c Release --no-build -o ${{ github.workspace }}/publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: ${{ github.workspace }}/publish
